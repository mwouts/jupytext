name: test-ui
run-name: Run UI tests with Galata

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test-ui:
    continue-on-error: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.68.0
          cache: true
          activate-environment: default
          environments: "default build"

      - name: Build JupyterLab extension
        run: pixi run -e build build-labextension

      - name: Fix jlpm (use build env's pip-installed version)
        run: |
          mkdir -p ~/.local/bin
          ln -sf "${{ github.workspace }}/.pixi/envs/build/bin/jlpm" ~/.local/bin/jlpm
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install from source
        run: |
          HATCH_BUILD_HOOKS_ENABLE=true python -m pip install -e '.[test-ui]'

      - name: Uninstall jupyter-fs
        run: |
          # Uninstall jupyter-fs as it overrides the original browser-test.js to
          # check its own functionality (https://github.com/jpmorganchase/jupyter-fs/blob/main/jupyterfs/browser-test.js)
          pip uninstall jupyter-fs -y

      - name: Install galata
        working-directory: jupyterlab/packages/jupyterlab-jupytext-extension/ui-tests
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        run: jlpm install

      - name: Install browser
        working-directory: jupyterlab/packages/jupyterlab-jupytext-extension/ui-tests
        run: jlpm playwright install chromium

      - name: Integration tests
        working-directory: jupyterlab/packages/jupyterlab-jupytext-extension/ui-tests
        run: jlpm playwright test

      - name: Upload UI Test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ui-test-output
          path: |
            jupyterlab/packages/jupyterlab-jupytext-extension/ui-tests/test-results
