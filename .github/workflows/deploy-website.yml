name: Deploy website to GitHub Pages
permissions: {}
on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-webiste.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build with Astro
        uses: withastro/action@b7d53628f8b666036b0238aadb0b984a2a489f26 # v6
        with:
          path: website
          node-version: 24
        # Builds with npm and uploads dist/ as a Pages artifact.
        # website/public/CNAME is copied into dist/ so the custom domain
        # is preserved on every deploy.

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref_type == 'tag'
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
