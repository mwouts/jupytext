name: coverage
run-name: Check coverage

on:
  workflow_call:

permissions:
  contents: read

jobs:
  coverage:
    name: >
      ${{ matrix.coverage }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        coverage: [unit, functional, integration, external]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Base Setup
        uses: jupyterlab/maintainer-tools/.github/actions/base-setup@95d85449e4f3f352e261221f6529f8ed307f5728 # v1
        with:
          python_version: 3.x

      - name: Install from source
        run: python -m pip install -e '.[test-cov,test-${{ matrix.coverage }}]'

      - name: Install a Jupyter Kernel
        run: python -m ipykernel install --name python_kernel --user

      - name: Run the tests
        run: pytest tests/${{ matrix.coverage }} -n logical --cov --cov-report=xml

      - name: Upload the coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          flags: ${{ matrix.coverage }}
          fail_ci_if_error: true
          verbose: true
