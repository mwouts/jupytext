name: test-conda
run-name: Run Conda tests for different OS

on:
  workflow_call:
    inputs:
      coverage:
        type: boolean
        description: Upload coverage to CodeCov
        default: true

permissions:
  contents: read

jobs:
  test-conda:
    name: >
      ${{ matrix.os }} (${{ matrix.dependency-mode }} dependencies)
    strategy:
      fail-fast: false
      matrix:
        os: [ 'ubuntu-latest', 'macos-latest', 'windows-latest' ]
        dependency-mode: [ 'locked', 'latest' ]
    runs-on: ${{ matrix.os }}
    # We still need to run pixi bash as we need it for Windows. Ensure to prefix
    # command with pixi so that we can pixi environment
    defaults:
      run:
        shell: pixi run bash -el {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.68.0
          cache: true
          activate-environment: default
          environments: "default build"

      - name: Update pixi environment
        if: matrix.dependency-mode == 'latest'
        run: pixi update

      - name: Build JupyterLab extension
        run: pixi run -e build build-labextension

      - name: Run tests
        run: |
          # Seems like without this command, MacOS cannot activate environment
          eval "$(pixi shell-hook)"

          # Install from source. The hatch-jupyter-builder hook has skip-if-exists set
          # on the already-built labextension assets, so jlpm is not invoked again.
          HATCH_BUILD_HOOKS_ENABLE=true python -m pip install -e .

          # Install a Jupyter Kernel
          python -m ipykernel install --name jupytext-ci --user

          # Test with pytest
          pytest -n logical --cov --cov-report=xml

          # Uninstall jupyter-fs as it overrides the original browser-test.js to
          # check its own functionality (https://github.com/jpmorganchase/jupyter-fs/blob/main/jupyterfs/browser-test.js)
          # So uninstall jupyter-fs before running browser check
          pip uninstall jupyter-fs -y

          # Check extension
          jupyter labextension list
          jupyter labextension list 2>&1 | grep -ie "jupyterlab-jupytext.*OK"

          # Test lab extension
          python -m jupyterlab.browser_check

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: true
          verbose: true
        if: inputs.coverage
