# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm" # See documentation for possible values
    directories: # Location of package manifests
      - "website"
      - "jupyterlab"
      - "jupyterlab/packages/jupyterlab-jupytext-extension"
    schedule:
      interval: "weekly"
    # Ignore devDependencies
    allow:
      - dependency-type: "production"
    groups:
      jupytext-extension-dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"
      jupytext-extension-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions" # See documentation for possible values
    directory: "/" # Workflow files stored in the default location of `.github/workflows`
    schedule:
      interval: "weekly"
    groups:
      actions-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 7
